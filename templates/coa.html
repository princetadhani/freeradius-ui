<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <title>CoA Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            font-family: 'Inter', sans-serif;
            background: #f8f9fa;
        }

        .navbar {
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 0.5rem 1rem;
            z-index: 1000;
        }

        .main-layout {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            background: #ffffff;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            transition: margin-left 0.2s;
        }

        .sidebar.collapsed {
            margin-left: -280px;
        }

        .explorer {
            overflow-y: auto;
            flex-grow: 1;
            padding: 10px 0;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 13px;
            color: #444;
            border-radius: 4px;
            margin: 0 8px;
        }

        .file-item:hover {
            background: #f0f0f0;
        }

        .file-item.active {
            background: #e7f3ff;
            color: #0078d4;
            font-weight: 600;
            border: 1px solid #b3d7ff;
        }

        .delete-btn {
            color: #dc3545;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .file-item:hover .delete-btn {
            opacity: 1;
        }

        .content-area {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .console {
            background: #1e1e1e;
            color: #00ff00;
            padding: 15px;
            font-family: monospace;
            border-radius: 5px;
            height: 210px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 13px;
            margin-top: 10px;
            border: 1px solid #333;
        }

        .card {
            border: none;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }

        /* Custom Editor Styling */
        .editor-wrapper {
            position: relative;
            border: 1px solid #dee2e6;
            border-radius: 0.375rem;
            background: #fff;
            height: 275px;
            overflow: hidden;
        }

        .editor-backdrop {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 0.375rem 0.75rem;
            font-family: inherit;
            font-size: 1rem;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #212529;
            /* Standard text color */
            pointer-events: none;
            /* Let clicks pass through to textarea */
            overflow-y: auto;
            z-index: 1;
        }

        .editor-backdrop .comment {
            color: #adb5bd;
            /* Muted gray */
            text-decoration: line-through;
            font-style: italic;
        }

        .editor-textarea {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 0.375rem 0.75rem;
            font-family: inherit;
            font-size: 1rem;
            line-height: 1.5;
            background: transparent !important;
            color: transparent !important;
            /* Hide native text, show background */
            caret-color: #000;
            /* Keep the blinking cursor visible */
            border: none;
            resize: none;
            outline: none;
            z-index: 2;
        }

        .editor-textarea::selection {
            background-color: rgba(13, 110, 253, 0.25);
            /* Bootstrap primary selection */
            color: transparent;
        }
    </style>
</head>

<body>

    <div class="toast-container position-fixed top-0 start-50 translate-middle-x p-3 mt-3" style="z-index: 1080;">
        <div id="statusToast" class="toast bg-white border-0 shadow-sm" role="alert" aria-live="assertive"
            aria-atomic="true">
            <div class="toast-body p-3">
                <div class="d-flex align-items-start">
                    <div id="toastIcon" class="me-3 fs-4"></div>
                    <div class="flex-grow-1">
                        <h6 id="toastTitle" class="mb-1 fw-bold text-dark">Notification</h6>
                        <div id="toastMessage" class="text-secondary mb-3" style="font-size: 13px;"></div>
                        <div id="toastActions" class="d-none">
                            <button type="button" class="btn btn-sm me-2 fw-bold" id="toastYesBtn">Yes</button>
                            <button type="button" class="btn btn-sm btn-light border text-dark"
                                data-bs-dismiss="toast">Cancel</button>
                        </div>
                    </div>
                    <button type="button" class="btn-close ms-2 mt-1" data-bs-dismiss="toast"
                        aria-label="Close"></button>
                </div>
            </div>
        </div>
    </div>

    <nav class="navbar">
        <div class="d-flex align-items-center w-100">
            <button class="btn btn-sm btn-light border-0 me-2" id="sidebarToggle">☰</button>
            <span class="fw-bold text-dark-emphasis">📡 CoA & Disconnect Manager</span>
            <div class="ms-auto">
                <a href="/" class="btn btn-sm btn-outline-primary text-decoration-none">⬅ Back to Editor</a>
            </div>
        </div>
    </nav>

    <div class="main-layout">
        <aside class="sidebar" id="sidebar">
            <div class="px-3 py-2 border-bottom small fw-bold text-muted text-uppercase">Saved CoA files</div>
            <div class="explorer" id="coaExplorer">
                {% for node in structure %}
                <div class="file-item" data-filename="{{ node.name }}" onclick="selectCoaFile('{{ node.name }}', this)">
                    <span>📄 {{ node.name }}</span>
                    <span class="delete-btn" title="Delete" onclick="deleteCoA('{{ node.name }}', event)">🗑️</span>
                </div>
                {% endfor %}
            </div>
        </aside>

        <main class="content-area">
            <div class="row">
                <div class="col-md-5">
                    <div class="card mb-4">
                        <div class="card-header bg-white d-flex justify-content-between align-items-center py-2">
                            <span class="fw-bold text-primary">Edit Attributes</span>
                            <button class="btn btn-sm btn-success py-0 px-2" style="font-size: 11px;"
                                onclick="createNewFile()">+ New File</button>
                        </div>
                        <div class="card-body">
                            <label class="small text-muted mb-1">Filename</label>
                            <input type="text" id="fileName" class="form-control mb-2" placeholder="e.g. coa1">
                            <label class="small text-muted mb-1">Packet Contents</label>
                            <div class="editor-wrapper">
                                <div id="backdrop" class="editor-backdrop"></div>
                                <textarea id="fileContent" class="editor-textarea" spellcheck="false"
                                    placeholder="User-Name = 'test'...."></textarea>
                            </div>
                            <button class="btn btn-success w-100 mt-3" onclick="saveCoA()">Save File</button>
                        </div>
                    </div>
                </div>

                <div class="col-md-7">
                    <div class="card mb-3">
                        <div class="card-header bg-white fw-bold text-danger">Execute Command</div>
                        <div class="card-body">
                            <div class="row g-2 mb-3">
                                <div class="col-md-4">
                                    <label class="small fw-bold">NAS IP Address</label>
                                    <input type="text" id="nasIp" class="form-control" value="10.86.203.18">
                                </div>
                                <div class="col-md-4">
                                    <label class="small fw-bold">Shared Secret</label>
                                    <input type="text" id="secret" class="form-control" value="prince">
                                </div>
                                <div class="col-md-4">
                                    <label class="small fw-bold">Request Type</label>
                                    <select id="requestType" class="form-select">
                                        <option value="coa">CoA</option>
                                        <option value="disconnect">Disconnect</option>
                                    </select>
                                </div>
                            </div>
                            <div
                                class="p-2 mb-3 bg-light border rounded small d-flex justify-content-between align-items-center">
                                <span>CoA File Use For Command Argument: <strong id="selectedDisplay"
                                        class="text-primary">None</strong></span>
                            </div>
                            <input type="hidden" id="selectedFileName">
                            <button class="btn btn-danger w-100 fw-bold py-2" id="sendBtn" onclick="sendCoA()" disabled>
                                Send Packet
                            </button>
                        </div>
                    </div>
                    <div class="fw-bold small text-muted px-1">TERMINAL OUTPUT</div>
                    <div id="output" class="console">System ready. Select a file to send or create a new one.</div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('sidebarToggle').onclick = () => document.getElementById('sidebar').classList.toggle('collapsed');

        window.onload = function () {
            const nasIp = localStorage.getItem("nasIp");
            const secret = localStorage.getItem("secret");

            if (nasIp) document.getElementById("nasIp").value = nasIp;
            if (secret) document.getElementById("secret").value = secret;

            if (nasIp || secret) {
                document.getElementById('output').textContent = "Restored previous session values.";
            }
        };

        ["nasIp", "secret"].forEach(id => {
            document.getElementById(id).addEventListener("input", (e) => {
                localStorage.setItem(id, e.target.value);
            });
        });
        function createNewFile() {
            document.querySelectorAll('.file-item').forEach(i => i.classList.remove('active'));
            document.getElementById('fileName').value = "";
            document.getElementById('fileContent').value = "";
            document.getElementById('selectedFileName').value = "";
            document.getElementById('selectedDisplay').innerText = "None (Creating new)";
            document.getElementById('sendBtn').disabled = true;
            document.getElementById('output').textContent = "Ready to create new file.";
            document.getElementById('fileName').focus();
            updateEditor();
        }

        function selectCoaFile(name, el) {
            document.querySelectorAll('.file-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('fileName').value = name.replace('.txt', '');
            document.getElementById('selectedFileName').value = name;
            document.getElementById('selectedDisplay').innerText = name;
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('sendBtn').innerHTML = `🚀 Send <strong>${name}</strong>`;

            fetch(`/get_file_content?path=coa/${name}`)
                .then(res => res.json()).then(data => {
                    document.getElementById('fileContent').value = data.content;
                    updateEditor();
                    document.getElementById('output').textContent = `Loaded ${name} for execution.`;
                });
        }

        function saveCoA() {
            const name = document.getElementById('fileName').value;
            if (!name) return showToast('Error', 'Please enter a filename!', 'error');

            // Trigger the Save themed toast
            showToast('Save File', `Are you sure you want to save changes to ${name}.txt?`, 'save', () => {

                // This runs if they click "Yes, Save"
                fetch('/coa/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filename: name, content: document.getElementById('fileContent').value })
                }).then(res => res.json()).then(data => {
                    if (data.status === 'success') {
                        showToast('Saved', `${name}.txt has been saved successfully.`, 'success');
                        setTimeout(() => location.reload(), 1500);
                    } else {
                        showToast('Failed', 'Failed to save file.', 'error');
                    }
                }).catch(() => showToast('Connection Error', 'Could not connect to the server.', 'error'));

            });
        }

        function sendCoA() {
            const file = document.getElementById('selectedFileName').value;
            const type = document.getElementById('requestType').value;
            const nasIp = document.getElementById('nasIp').value;
            const secret = document.getElementById('secret').value;

            // ✅ Save again (safety)
            localStorage.setItem("nasIp", nasIp);
            localStorage.setItem("secret", secret);

            const outputDiv = document.getElementById('output');
            outputDiv.textContent = `>>> Processing ${type.toUpperCase()} request...`;

            fetch('/coa/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    filename: file,
                    nas_ip: nasIp,
                    secret: secret,
                    req_type: type
                })
            }).then(res => res.json()).then(data => {
                outputDiv.textContent = data.output || data.error || "Execution finished.";
            });
        }

        function deleteCoA(filename, event) {
            event.stopPropagation();

            // Trigger the Delete themed toast
            showToast('Delete File', `Are you sure you want to permanently delete ${filename}? This cannot be undone.`, 'delete', () => {

                // This runs if they click "Yes, Delete"
                fetch(`/coa/delete/${filename}`, { method: 'DELETE' }).then(() => {
                    showToast('Deleted', `${filename} was deleted successfully.`, 'success');
                    setTimeout(() => location.reload(), 1500);
                }).catch(() => showToast('Error', 'Failed to delete the file.', 'error'));

            });
        }


        // --- Editor Highlighting Logic ---
        const textarea = document.getElementById('fileContent');
        const backdrop = document.getElementById('backdrop');

        function updateEditor() {
            let text = textarea.value;

            // Escape HTML to prevent code breakage
            text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            // Find lines starting with # and wrap them in a span
            let highlighted = text.split('\n').map(line => {
                if (line.trim().startsWith('#')) {
                    return `<span class="comment">${line}</span>`;
                }
                return line;
            }).join('\n');

            // Fix for trailing newlines not rendering in pre-wrap divs
            if (text[text.length - 1] === '\n') {
                highlighted += ' ';
            }

            backdrop.innerHTML = highlighted;
        }

        // Sync scrolling between the textarea and the backdrop
        textarea.addEventListener('scroll', () => {
            backdrop.scrollTop = textarea.scrollTop;
        });

        // Update highlighting whenever the user types
        textarea.addEventListener('input', updateEditor);

        let toastInstance = null;

        function showToast(title, message, actionType = 'success', onConfirm = null) {
            const toastEl = document.getElementById('statusToast');
            const toastTitle = document.getElementById('toastTitle');
            const toastMessage = document.getElementById('toastMessage');
            const toastIcon = document.getElementById('toastIcon');
            const toastActions = document.getElementById('toastActions');
            const yesBtn = document.getElementById('toastYesBtn');

            if (!toastInstance) {
                toastInstance = new bootstrap.Toast(toastEl);
            }

            // Set text
            toastTitle.textContent = title;
            toastMessage.textContent = message;

            // Reset dynamic classes
            yesBtn.className = 'btn btn-sm me-2 fw-bold';
            toastEl.className = 'toast bg-white border-0 shadow';

            // Theme the toast based on the action
            if (actionType === 'save') {
                toastIcon.innerHTML = '💾';
                yesBtn.classList.add('btn-success');
                yesBtn.textContent = 'Yes, Save';
                toastEl.classList.add('border-start', 'border-success', 'border-4');
            } else if (actionType === 'delete') {
                toastIcon.innerHTML = '⚠️';
                yesBtn.classList.add('btn-danger');
                yesBtn.textContent = 'Yes, Delete';
                toastEl.classList.add('border-start', 'border-danger', 'border-4');
            } else if (actionType === 'success') {
                toastIcon.innerHTML = '✅';
                toastEl.classList.add('border-start', 'border-success', 'border-4');
            } else if (actionType === 'error') {
                toastIcon.innerHTML = '❌';
                toastEl.classList.add('border-start', 'border-danger', 'border-4');
            }

            // Handle button visibility and auto-hide behavior
            if (onConfirm) {
                toastActions.classList.remove('d-none');
                toastInstance._config.autohide = false; // Stay open waiting for click

                // Refresh event listener cleanly
                const newYesBtn = yesBtn.cloneNode(true);
                yesBtn.parentNode.replaceChild(newYesBtn, yesBtn);
                newYesBtn.addEventListener('click', () => {
                    toastInstance.hide();
                    onConfirm();
                });
            } else {
                toastActions.classList.add('d-none');
                toastInstance._config.autohide = true;
                toastInstance._config.delay = 2500; // Auto-close after 2.5s for normal alerts
            }

            toastInstance.show();
        }

    </script>
</body>

</html>
